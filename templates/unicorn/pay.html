<!DOCTYPE html>
<html lang="zh-CN">
<head><meta name="robots" content="noindex,nofollow"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>支付 | {{ site.name }}</title><link rel="stylesheet" href="/assets/unicorn/css/bootstrap.min.css"><link rel="stylesheet" href="/assets/unicorn/css/base.css"><link rel="stylesheet" href="/assets/unicorn/css/common.css"><link rel="stylesheet" href="/assets/unicorn/css/index.css"></head>
<body>
<header class="header sticky-top"><div class="container"><nav class="navbar navbar-expand-lg navbar-light"><a class="navbar-brand" href="/">{{ site.logo_text }}</a><div class="collapse navbar-collapse show"><ul class="navbar-nav me-auto"><li class="nav-item"><a class="nav-link" href="/">首页</a></li><li class="nav-item"><a class="nav-link" href="/order-search">订单查询</a></li></ul></div></nav></div></header>
<section class="main-container"><div class="container"><div class="good-card"><div class="row justify-content-center"><div class="col-md-8 col-12"><div class="card m-3"><div class="card-body p-4 text-center"><h3 class="card-title text-primary">支付订单</h3><h6><small class="text-muted">订单号：{{ data.order_no }}，支付号：{{ data.payment_no }}</small></h6><h6><small class="text-warning">应付金额: ￥{{ data.amount_display }}</small></h6>{% if data.qr_code %}<div class="err-message p-3"><pre class="text-start bg-light p-3">{{ data.qr_code }}</pre></div>{% if data.pay_url %}<a href="{{ data.pay_url }}" class="btn btn-dark">打开支付页</a>{% endif %}{% else %}<a href="{{ data.pay_url }}" class="btn btn-dark">立即支付</a>{% endif %}</div></div></div></div></div></div></section>
<footer class="footer p-3"><div class="row"><div class="col-12 text-center"><div class="author">Powered by：<a href="http://dujiaoka.com">@独角数卡</a></div><div class="custom">{{ site.footer | safe }}</div></div></div></footer>
<script src="/assets/unicorn/js/jquery-3.6.0.min.js"></script><script src="/assets/unicorn/js/bootstrap.min.js"></script>
</body></html>
