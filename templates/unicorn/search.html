<!DOCTYPE html>
<html lang="{{ site.language | default('zh-CN') }}">
<head><meta name="robots" content="noindex,nofollow"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>{{ t("search.title") }} | {{ site.name }}</title><link rel="stylesheet" href="/assets/unicorn/css/bootstrap.min.css"><link rel="stylesheet" href="/assets/unicorn/css/base.css"><link rel="stylesheet" href="/assets/unicorn/css/common.css"><link rel="stylesheet" href="/assets/unicorn/css/index.css"></head>
<body>
<header class="header sticky-top"><div class="container"><nav class="navbar navbar-expand-lg navbar-light"><a class="navbar-brand" href="/">{{ site.logo_text }}</a><div class="collapse navbar-collapse show"><ul class="navbar-nav me-auto"><li class="nav-item"><a class="nav-link" href="/">{{ t("nav.home") }}</a></li><li class="nav-item"><a class="nav-link active" href="/order-search">{{ t("nav.order_search") }}</a></li></ul></div></nav></div></header>
<section class="main-container"><div class="container"><div class="good-card"><div class="row justify-content-center"><div class="col-md-8 col-12"><div class="card m-3"><div class="card-body p-4"><h3 class="card-title">{{ t("search.title") }}</h3><h6><small class="text-muted">{{ t("search.description") }}</small></h6><div class="buy-form mt-3"><ul class="nav nav-pills mb-3"><li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#order_search_by_sn">{{ t("search.by_order_no") }}</a></li><li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#order_search_by_email">{{ t("search.by_email_short") }}</a></li><li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#order_search_by_browser">{{ t("search.by_browser_tab") }}</a></li></ul><div id="searchTabContent" class="tab-content"><div class="tab-pane fade active show" id="order_search_by_sn"><form action="/search-order-by-sn?_csrf={{ csrf }}" method="post"><div class="form-group row"><div class="col-12 col-md-8"><label class="col-form-label">{{ t("search.order_no_label_colon") }}</label><input type="text" class="form-control form-control-sm" name="order_sn" required></div><div class="col-12 col-md-8"><label class="col-form-label">{{ t("buy.search_password_label") }}</label><input type="text" class="form-control form-control-sm" name="search_pwd"></div><div class="col-12 mt-3"><button type="submit" class="btn btn-outline-primary">{{ t("search.search_now") }}</button></div></div></form></div><div class="tab-pane fade" id="order_search_by_email"><form action="/search-order-by-email?_csrf={{ csrf }}" method="post"><div class="form-group row"><div class="col-12 col-md-8"><label class="col-form-label">{{ t("search.email_label_colon") }}</label><input type="email" class="form-control form-control-sm" name="email" required></div><div class="col-12 col-md-8"><label class="col-form-label">{{ t("buy.search_password_label") }}</label><input type="password" class="form-control form-control-sm" name="search_pwd"></div><div class="col-12 mt-3"><button type="submit" class="btn btn-outline-primary">{{ t("search.search_now") }}</button></div></div></form></div><div class="tab-pane fade" id="order_search_by_browser"><form action="/search-order-by-browser?_csrf={{ csrf }}" method="post"><div class="form-group row"><div class="col-12 mt-3"><button type="submit" class="btn btn-outline-primary">{{ t("search.search_now") }}</button></div></div></form></div></div></div></div></div></div></div></div></section>
<footer class="footer p-3"><div class="row"><div class="col-12 text-center"><div class="custom">{{ site.footer | safe }}</div></div></div></footer>
<script src="/assets/unicorn/js/jquery-3.6.0.min.js"></script><script src="/assets/unicorn/js/bootstrap.min.js"></script>
</body></html>
