<!DOCTYPE html>
<html lang="zh-CN">
<head><meta name="robots" content="noindex,nofollow"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>订单列表 | {{ site.name }}</title><link rel="stylesheet" href="/assets/unicorn/css/bootstrap.min.css"><link rel="stylesheet" href="/assets/unicorn/css/base.css"><link rel="stylesheet" href="/assets/unicorn/css/common.css"><link rel="stylesheet" href="/assets/unicorn/css/index.css"></head>
<body>
<header class="header sticky-top"><div class="container"><nav class="navbar navbar-expand-lg navbar-light"><a class="navbar-brand" href="/">{{ site.logo_text }}</a><div class="collapse navbar-collapse show"><ul class="navbar-nav me-auto"><li class="nav-item"><a class="nav-link" href="/">首页</a></li><li class="nav-item"><a class="nav-link" href="/order-search">订单查询</a></li></ul></div></nav></div></header>
<section class="main-container"><div class="container"><div class="order-card"><div class="row justify-content-center">{% for item in data.orders %}<div class="col-md-8"><div class="card mt-3"><div class="row no-gutters"><div class="col-12 col-md-6"><div class="card card-body p-3 border-0"><div class="mx-auto"><h5><small class="text-muted">订单号：{{ item.order.order_no }}</small></h5><div class="mb-1"><label>创建时间：</label><span>{{ item.order.created_at }}</span></div><div class="mb-1"><label>邮箱：</label><span>{{ item.order.guest_email }}</span></div><div class="mb-1"><label>实际支付：</label><span>￥{{ item.amount_display }}</span></div><div class="mb-1"><label>状态：</label><span class="badge bg-primary">{{ item.order.status }}</span></div></div></div></div><div class="col-12 col-md-6"><div class="card-body"><h6 class="card-title">发货信息</h6><textarea class="form-control" rows="5">{% if item.fulfillment %}{{ item.fulfillment.payload }}{% endif %}</textarea><a class="btn btn-primary mt-2" href="/detail-order-sn/{{ item.order.order_no }}">查看详情</a></div></div></div></div></div>{% endfor %}</div></div></div></section>
<footer class="footer p-3"><div class="row"><div class="col-12 text-center"><div class="custom">{{ site.footer | safe }}</div></div></div></footer>
<script src="/assets/unicorn/js/jquery-3.6.0.min.js"></script><script src="/assets/unicorn/js/bootstrap.min.js"></script>
</body></html>
