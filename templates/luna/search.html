<!doctype html>
<html lang="zh-CN">
<head><meta name="robots" content="noindex,nofollow">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>订单查询 - {{ site.name }}</title>
  <link rel="stylesheet" href="/assets/luna/layui/css/layui.css">
  <link rel="stylesheet" href="/assets/luna/main.css">
  <style>
    .layui-table td, .layui-table th {
      padding: 9px 5px;
    }
  </style>
</head>
<body>
<div class="background"></div>
<div class="header">
  <div class="layui-row">
    <div class="layui-col-md8 layui-col-md-offset2 layui-col-sm12">
      <div class="header-box">
        <a href="/">
          <img src="/assets/common/images/default.jpg" alt="">
          <div class="info">{{ site.logo_text }}</div>
        </a>
        <div class="query layui-hide-xs">
          <a href="/order-search">
            <svg class="icon" viewBox="0 0 1024 1024" width="20" height="20">
              <path d="M965.6 447.2 752 447.2c-14.4 0-26.4-12-26.4-26.4 0-14.4 12-26.4 26.4-26.4l213.6 0c14.4 0 26.4 12 26.4 26.4C992.8 435.2 980.8 447.2 965.6 447.2zM965.6 233.6 699.2 233.6c-14.4 0-26.4-12-26.4-26.4 0-14.4 12-26.4 26.4-26.4l267.2 0c14.4 0 26.4 12 26.4 26.4C992.8 221.6 980.8 233.6 965.6 233.6zM606.4 623.2l156.8 156.8c21.6 21.6 21.6 56.8 0 78.4-21.6 21.6-56.8 21.6-78.4 0L528 701.6c-16-16-20-39.2-12-59.2-51.2 44-117.6 72-190.4 72-162.4 0-293.6-131.2-293.6-293.6s131.2-293.6 293.6-293.6 293.6 131.2 293.6 293.6c0 72.8-28 139.2-72 190.4C567.2 603.2 590.4 607.2 606.4 623.2zM324.8 233.6c-103.2 0-187.2 84-187.2 187.2s84 187.2 187.2 187.2S512 523.2 512 420 428 233.6 324.8 233.6zM805.6 607.2l160 0c14.4 0 26.4 12 26.4 26.4 0 14.4-12 26.4-26.4 26.4l-160 0c-14.4 0-26.4-12-26.4-26.4C779.2 619.2 791.2 607.2 805.6 607.2z" fill="#ffffff"></path>
            </svg>
            <span>订单查询</span>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="layui-row">
    <div class="layui-col-md8 layui-col-md-offset2 layui-col-sm12">
      <div class="main-box">
        <div class="pay-title">
          <svg style="margin-bottom: -6px;" class="icon" viewBox="0 0 1024 1024" width="27" height="27">
            <path d="M320.512 428.032h382.976v61.44H320.512zM320.512 616.448h320.512v61.44H320.512z" fill="#00EAFF"></path>
            <path d="M802.816 937.984H221.184l-40.96-40.96V126.976l40.96-40.96h346.112l26.624 10.24 137.216 117.76 98.304 79.872 15.36 31.744v571.392l-41.984 40.96z m-540.672-81.92h500.736V345.088L677.888 276.48 550.912 167.936H262.144v688.128z" fill="#3C8CE7"></path>
          </svg>
          订单查询
        </div>
        <div class="layui-card-body">
          <p style="color: #3C8CE7;font-size: 18px;font-weight: 700; text-align: center;margin: 20px 0">
            最多只能查询最近 5 笔订单
          </p>
          <div class="layui-tab">
            <ul class="layui-tab-title">
              <li class="layui-this">订单号查询</li>
              <li>下单邮箱查询</li>
              <li>浏览器查询</li>
            </ul>
            <div class="layui-tab-content" style="text-align: center">
              <div class="layui-tab-item layui-show">
                <form class="layui-form" action="/search-order-by-sn?_csrf={{ csrf }}" method="post">
                  <div class="entry">
                    <span class="l-msg">订单号:</span>
                    <label class="input">
                      <input type="text" name="order_sn" required lay-verify="required" autocomplete="off">
                    </label>
                  </div>
                  <div class="btn">
                    <button lay-submit lay-filter="orderByid">立即查询</button>
                  </div>
                </form>
              </div>

              <div class="layui-tab-item">
                <form class="layui-form" action="/search-order-by-email?_csrf={{ csrf }}" method="post">
                  <div class="entry">
                    <span class="l-msg">邮箱:</span>
                    <label class="input">
                      <input type="email" name="email" required lay-verify="required" autocomplete="off">
                    </label>
                  </div>
                  <div class="entry">
                    <span class="l-msg">查询密码:</span>
                    <label class="input">
                      <input type="password" name="search_pwd" autocomplete="off">
                    </label>
                  </div>
                  <div class="btn">
                    <button lay-submit lay-filter="orderByAccount">立即查询</button>
                  </div>
                </form>
              </div>

              <div class="layui-tab-item">
                <form class="layui-form" action="/search-order-by-browser?_csrf={{ csrf }}" method="post">
                  <div class="btn">
                    <button lay-submit lay-filter="searchOrderByBrowser">立即查询</button>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="footer">
  <div class="layui-row"><div class="layui-col-md8 layui-col-md-offset2 layui-col-sm12">
    <div style="text-align:center">{{ site.footer | safe }}</div>
  </div></div>
</div>
<script src="/assets/luna/layui/layui.js"></script>
<script src="/assets/luna/js/jquery-3.4.1.min.js"></script>
<script>
  layui.use(['element', 'form'], function () {
    layui.element;
    layui.form;
  });
</script>
</body>
</html>
